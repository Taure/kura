name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v1
    permissions:
      contents: write
      pull-requests: write
    with:
      version-file: '.tool-versions'
      enable-ct: true
      enable-ex-doc: true
      enable-hank: true
      enable-sheldon: true
      enable-audit: true
      enable-coverage: true
      enable-sbom: true
      enable-sbom-scan: true
      enable-dependency-submission: true
      enable-summary: true
      enable-mutate: true
      enable-elp-lint: true
      enable-elp-eqwalize: true
      mutate-diff: true
      mutate-min-score: '80'
      mutate-test-framework: 'ct'

      extra-services-compose: 'docker-compose.ci.yml'
