name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    uses: Taure/erlang-ci/.github/workflows/ci.yml@v1
    with:
      otp-version: '28'
      rebar3-version: '3.24'
      enable-ct: true
      enable-ex-doc: true
      eunit-args: '--module=kura_assoc_tests,kura_cast_assoc_tests,kura_changeset_tests,kura_embed_tests,kura_integration_assoc_tests,kura_integration_tests,kura_many_to_many_tests,kura_migrator_tests,kura_multi_tests,kura_query_compiler_tests,kura_query_tests,kura_schemaless_tests,kura_telemetry_tests,kura_types_tests,kura_stress_tests,kura_bench_tests,kura_migration_stress_tests'
      postgres: true
      postgres-version: '16'
      postgres-db: 'kura_test'
      postgres-password: 'root'
      postgres-port: '5555'

  release:
    needs: ci
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from CHANGELOG.md
        id: version
        run: |
          VERSION=$(awk '/^## \[/{gsub(/[\[\]]/, "", $2); print $2; exit}' CHANGELOG.md)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog and create release
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BODY=$(awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md)
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --notes "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
